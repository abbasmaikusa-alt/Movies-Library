<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Library</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#141414">

<style>
body{
    margin:0;
    background:#141414;
    color:white;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    background:#000;
    color:#e50914;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

/* Search Bar */
.search-box{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    padding:20px;
}

.search-box input{
    width:350px;
    padding:12px;
    border:none;
    border-radius:6px;
    font-size:16px;
}

.search-box button{
    padding:12px 20px;
    border:none;
    background:#e50914;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.search-box button:hover{
    background:#ff1f1f;
}

.movies{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.movie{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    transition:.3s;
}

.movie:hover{
    transform:scale(1.03);
}

.movie img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.info h2{
    margin:0;
    font-size:22px;
}

.info p{
    color:#ccc;
}

.watch{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    background:#e50914;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.watch:hover{
    background:#ff1f1f;
}
</style>

</head>

<body>

<header>
MOVIE LIBRARY
</header>

<!-- Search -->
<div class="search-box">
    <input type="text" id="searchInput" placeholder="Search movies...">
    <button id="searchBtn">Search</button>
</div>

<div class="movies" id="movies"></div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

const movies=document.getElementById("movies");
const searchInput=document.getElementById("searchInput");
const searchBtn=document.getElementById("searchBtn");

let movieList=[];

// Display movies
function displayMovies(list){

movies.innerHTML="";

if(list.length===0){
    movies.innerHTML="<h2 style='padding:20px;'>No movie found.</h2>";
    return;
}

list.forEach(movie=>{

movies.innerHTML+=`

<div class="movie">

<img src="${movie.poster}" alt="${movie.title}">

<div class="info">

<h2>${movie.title}</h2>

<p>${movie.category}</p>

<a class="watch" href="${movie.video}" target="_blank">

Watch Movie

</a>

</div>

</div>

`;

});

}

// Load movies
onSnapshot(collection(db,"movies"),(snapshot)=>{

movieList=[];

snapshot.forEach((doc)=>{

movieList.push(doc.data());

});

displayMovies(movieList);

});

// Search function
function searchMovies(){

const text=searchInput.value.toLowerCase();

const filtered=movieList.filter(movie=>

movie.title.toLowerCase().includes(text) ||

movie.category.toLowerCase().includes(text)

);

displayMovies(filtered);

}

// Search button
searchBtn.addEventListener("click",searchMovies);

// Search while typing
searchInput.addEventListener("keyup",searchMovies);

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("./service-worker.js");

});

}

</script>

</body>
</html>
